# Tacharchy Sysctl Configuration
# Version: 0.1.0
# 
# This file contains kernel parameter tuning for desktop responsiveness.
# Every value is documented with reasoning. Adjust based on your hardware.
#
# Project: https://github.com/tacharchy/tacharchy

# =============================================================================
# MEMORY TUNING
# =============================================================================

# vm.swappiness - Controls swap aggressiveness
# Value 100: Recommended for NVMe swap where I/O cost is comparable to filesystem.
# The kernel's formula suggests >=100 when swap speed >= filesystem speed.
# Use 10-30 for HDD swap to avoid aggressive swapping.
# Default: 60
#vm.swappiness = 100

# vm.vfs_cache_pressure - Dentry/inode cache reclaim aggressiveness
# Value 50: Half as aggressive as default (100). Keeping more VFS cache in RAM
# improves file operation responsiveness. Best for 16GB+ RAM systems.
# Default: 100
vm.vfs_cache_pressure = 50

# vm.dirty_bytes - Max dirty data per process before sync write
# Value 268435456 (256MB): Prevents massive I/O spikes from single processes
# accumulating GB of dirty pages. Smoother write behavior.
# Default: 0 (uses dirty_ratio percentage instead)
vm.dirty_bytes = 268435456

# vm.dirty_background_bytes - Threshold to start background writeback
# Value 67108864 (64MB): Starts flushing early, prevents sudden I/O bursts
# when hitting dirty_bytes limit. More frequent but smoother I/O.
# Default: 0 (uses dirty_background_ratio percentage instead)
vm.dirty_background_bytes = 67108864

# vm.page-cluster - Swap readahead page count (2^n pages)
# Value 0: Disabled readahead. NVMe has no benefit from sequential reads.
# HDD swap should use 3 (default) for 8-page readahead.
# Default: 3
#vm.page-cluster = 0

# vm.dirty_writeback_centisecs - Wakeup interval for dirty page flush
# Value 1500 (15 seconds): Less frequent wakeups = fewer I/O interruptions.
# dirty_bytes limits already ensure data gets written before problems arise.
# Tradeoff: up to 15s data loss on crash vs 5s default.
# Default: 500 (5 seconds)
vm.dirty_writeback_centisecs = 1500

# =============================================================================
# KERNEL TUNING
# =============================================================================

# kernel.nmi_watchdog - Non-maskable interrupt watchdog
# Value 0: Disabled. The watchdog adds slight timer overhead. Desktop systems
# rarely need automatic kernel hang detection - just reboot if it hangs.
# Keep enabled (1) for servers or kernel development.
# Default: 1 (enabled on most systems)
kernel.nmi_watchdog = 0

# kernel.printk - Console log levels (console_default loglevel min boot)
# Value "3 3 3 3": Only errors and worse to console. Reduces console flicker
# and I/O overhead. All messages still logged to dmesg/journalctl.
# Default: 4 4 1 7
kernel.printk = 3 3 3 3

# =============================================================================
# FILESYSTEM TUNING
# =============================================================================

# fs.inotify.max_user_instances - Max inotify instances per user
# Value 1024: File watchers (VS Code, webpack, node) can easily exceed 128.
# Prevents "too many open files" errors in development workflows.
# Default: 128
fs.inotify.max_user_instances = 1024

# fs.inotify.max_user_watches - Max inotify watches per user
# Value 524288: Large projects and monorepos need many watches.
# Standard recommendation for developer machines.
# Default: 8192 (varies by distro)
fs.inotify.max_user_watches = 524288

# fs.file-max - System-wide max open file descriptors
# Value 2097152 (2M): Docker, browsers, dev tools all open many files.
# Provides headroom for modern desktop workloads.
# Default: varies (often 100000-200000)
fs.file-max = 2097152

# =============================================================================
# NETWORK TUNING
# (Also see tacharchy-network package for BBR and ring buffers)
# =============================================================================

# net.core.netdev_max_backlog - Max packets queued per interface input
# Value 4096: Reduces packet drop under burst conditions (gaming, transfers).
# Gigabit+ networks can overwhelm the default ~1000.
# Default: varies (often 1000)
net.core.netdev_max_backlog = 4096
