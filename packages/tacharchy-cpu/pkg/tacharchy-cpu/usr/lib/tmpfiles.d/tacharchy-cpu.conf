# Tacharchy CPU Tmpfiles Configuration
# Sets per-core EPP (Energy Performance Preference) for Intel hybrid CPUs
#
# This file is a template. The install script will customize it based on
# detected CPU topology. If you have a non-hybrid CPU, this file has no effect.
#
# On Intel 12th gen+ (hybrid P/E cores), we set:
#   P-cores: performance EPP (aggressive frequency scaling)
#   E-cores: balance_performance EPP (default efficiency)
#
# The governor should be 'powersave' (which in HWP mode means "let hardware decide")
# combined with performance EPP for the best balance of power and responsiveness.

# This directory is used by the install script to write per-core EPP settings
# w = write line if it exists, f = create file
d /run/tacharchy 0755 root root -
