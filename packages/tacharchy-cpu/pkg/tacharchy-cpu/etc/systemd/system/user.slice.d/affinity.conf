# Tacharchy User Slice CPU Affinity Configuration
# Restricts user processes to P-cores only on Intel hybrid CPUs
#
# On hybrid CPUs (Intel 12th gen+), P-cores are significantly faster:
#   - P-cores: up to 5.8 GHz
#   - E-cores: up to 4.3 GHz
#
# This ensures your interactive session (desktop, games, browser) runs on
# the fastest cores. Background system services can still use all cores.
#
# IMPORTANT: Adjust AllowedCPUs to match your CPU topology!
# This default is for a 6P+8E configuration (i5-13600K).
# Run 'lscpu -e' or check /sys/devices/system/cpu/cpu*/topology/core_type
# to identify your P-core numbers.
#
# Common configurations:
#   i5-13600K (6P+8E):  P-cores are CPUs 0-11 (with HT)
#   i7-13700K (8P+8E):  P-cores are CPUs 0-15 (with HT)
#   i9-13900K (8P+16E): P-cores are CPUs 0-15 (with HT)
#
# To find your P-cores:
#   for i in /sys/devices/system/cpu/cpu[0-9]*; do
#     core=$(basename $i)
#     type=$(cat $i/topology/core_type 2>/dev/null)
#     echo "$core: $type"
#   done
#
# Set to empty or remove file to allow all cores.

[Slice]
# Default for 6P+8E (12 P-core threads) - ADJUST FOR YOUR CPU!
AllowedCPUs=0-11
