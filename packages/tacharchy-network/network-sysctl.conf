# Tacharchy Network Sysctl Configuration
# Network stack tuning for improved throughput and reduced latency
#
# Project: https://github.com/tacharchy/tacharchy

# =============================================================================
# TCP CONGESTION CONTROL
# =============================================================================

# TCP congestion control algorithm
# BBR (Bottleneck Bandwidth and Round-trip propagation time) measures actual
# bandwidth and RTT rather than using packet loss as a signal.
# Benefits:
#   - Better throughput on high-bandwidth, high-latency connections
#   - Reduces bufferbloat
#   - Doesn't overreact to random packet loss
# Requires: tcp_bbr kernel module (see /etc/modules-load.d/tacharchy-bbr.conf)
net.ipv4.tcp_congestion_control = bbr

# =============================================================================
# NETWORK BACKLOG
# =============================================================================

# Maximum number of packets queued on the input side of a network interface
# When packets arrive faster than the kernel can process them, they queue here.
# Default (~1000) is too low for gigabit+ under burst conditions.
# Increasing to 4096 reduces packet drop during gaming, transfers, streaming.
net.core.netdev_max_backlog = 4096

# =============================================================================
# ADDITIONAL TCP TUNING (Optional)
# =============================================================================

# Increase TCP buffer sizes for high-bandwidth connections
# Uncomment if you have 10Gbps+ networking or high-latency links
# net.core.rmem_max = 16777216
# net.core.wmem_max = 16777216
# net.ipv4.tcp_rmem = 4096 87380 16777216
# net.ipv4.tcp_wmem = 4096 65536 16777216

# Enable TCP Fast Open (requires server support)
# net.ipv4.tcp_fastopen = 3

# Reduce swap usage of network buffers
# vm.min_free_kbytes = 65536
