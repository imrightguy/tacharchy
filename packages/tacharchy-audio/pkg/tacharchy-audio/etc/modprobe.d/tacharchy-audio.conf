# Tacharchy Audio Modprobe Configuration
# Disables HD audio power saving to prevent audible pops/clicks
#
# The power_save feature puts the HD audio codec to sleep after inactivity,
# which can cause audible pops when the codec wakes up.
# Power savings are minimal (~200mW) vs the annoyance of audio glitches.

options snd_hda_intel power_save=0
