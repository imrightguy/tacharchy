# Tacharchy Audio Realtime Limits
# Grants the audio group permission to use realtime scheduling and lock memory.
#
# PipeWire's audio threads use SCHED_FIFO at priority 20.
# This limit allows rtkit-daemon to grant RT priority up to 99.
# memlock unlimited prevents audio buffers from being swapped.

@audio - rtprio 99
@audio - memlock unlimited
