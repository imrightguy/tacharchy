# Tacharchy Intel GPU Configuration
# These are example settings for Intel GPU optimization
#
# Intel GPUs use the i915 driver. Most tuning is automatic.
# The key optimizations are VA-API drivers and IPU firmware (laptops).
#
# Apply by copying to /etc/modprobe.d/tacharchy-intel.conf

# Enable framebuffer compression for power saving (laptops)
# options i915 enable_fbc=1

# Enable PSR (Panel Self Refresh) for power saving
# options i915 enable_psr=1

# Force GuC firmware load (required for some features on newer GPUs)
# options i915 enable_guc=2

# Disable frame buffer compression if you experience artifacts
# options i915 enable_fbc=0
