# Tacharchy AMD GPU Configuration
# These are example settings for AMD GPU optimization
#
# AMD GPUs use the amdgpu driver which handles most tuning automatically.
# The following are optional tweaks that can improve performance or efficiency.
#
# Apply by copying to /etc/modprobe.d/tacharchy-amd.conf

# Enable AMD OverDrive for undervolting/overclocking (requires root)
# Use 'corectrl' or 'lact' GUI tools to configure after enabling
# Uncomment to enable:
# options amdgpu ppfeaturemask=0xffffffff

# Force display clock gating for power saving (laptops)
# options amdgpu cg_display_mask=0xff

# Enable deep color support (if your display supports it)
# options amdgpu deep_color=1
